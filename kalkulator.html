<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #ffe6f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 300px;
            text-align: center;
        }

        h2{
            color: #ff4da6;
            margin-bottom: 20px;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button{
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            background: #ff4da6;
            color: white;
            cursor: pointer;
        }

        button:hover{
            background: #ff2e92;
        }

        #hasil{
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #ff4da6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Kalkulator Sederhana</h2>

        <input type="number" id="angka1" placeholder="Masukkan angka pertama">

        <input type="number" id="angka2" placeholder="Masukkan angka kedua">

        <br>

        <button onclick="tambah()">+</button>
        <button onclick="kurang()">-</button>
        <button onclick="kali()">×</button>
        <button onclick="bagi()">÷</button>

        <div id="hasil">Hasil : 0</div>
    </div>

    <script>
        function tambah(){
            let a = Number(document.getElementById("angka1").value);
            let b = Number(document.getElementById("angka2").value);

            document.getElementById("hasil").innerHTML =
            "Hasil : " + (a + b);
        }

        function kurang(){
            let a = Number(document.getElementById("angka1").value);
            let b = Number(document.getElementById("angka2").value);

            document.getElementById("hasil").innerHTML =
            "Hasil : " + (a - b);
        }

        function kali(){
            let a = Number(document.getElementById("angka1").value);
            let b = Number(document.getElementById("angka2").value);

            document.getElementById("hasil").innerHTML =
            "Hasil : " + (a * b);
        }

        function bagi(){
            let a = Number(document.getElementById("angka1").value);
            let b = Number(document.getElementById("angka2").value);

            document.getElementById("hasil").innerHTML =
            "Hasil : " + (a / b);
        }
    </script>

</body>
</html>
